services:
  - type: web
    name: bandhan-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: bandhan-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: https://bandhan-demo.vercel.app

databases:
  - name: bandhan-db
    plan: free
    databaseName: bandhan
    user: bandhan
